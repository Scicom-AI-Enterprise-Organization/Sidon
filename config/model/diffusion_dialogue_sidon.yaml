lightning_module:
  _target_: sidon.model.dialogue_sidion.lightning_module.DialogueSidonDiffusionLightningModule
  _recursive_: false

cfg:
  lora: false
  sample_rate: 24000
  ssl_model_name: facebook/w2v-bert-2.0
  vae_checkpoint_path: /home/qch10240fz/nakata/github.com/Sidon/sidon/jhqmq4u3/checkpoints/epoch=0-step=510000.ckpt

  diffusion_head:
    # Defaults map to module fallbacks; override as needed.
    hidden_size: 512
    head_layers: 6
    head_ffn_ratio: 4.0
    rms_norm_eps: 1.0e-5

  diffusion:
    num_train_timesteps: 1000
    num_inference_steps: 1000
    prediction_type: v_prediction

  optim:
    lr: 1e-5
    weight_decay: 0.01

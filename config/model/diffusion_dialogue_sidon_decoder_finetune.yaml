lightning_module:
  _target_: sidon.model.dialogue_sidion.decoder_finetune_lightning_module.DialogueSidonDacDecoderFinetuneLightningModule
  _recursive_: false

cfg:
  sample_rate: 24000

  # Predictor checkpoint to provide latent/features for decoder finetuning.
  predictor_checkpoint_path: null
  predictor_class: DialogueSidonDiffusionLightningModule

  # Switch this per ablation:
  # - latents: DialogueSidonDiffusionLightningModule / DialogueSidonNoDiffusionHeadLightningModule
  # - features: DialogueSidonNoVaeLatentLayer8LightningModule / DialogueSidonNoVaeLatentWithDiffusionHeadLightningModule
  predictor_representation: latents

  # If true, uses predictor diffusion sampling output instead of direct regressed output.
  use_diffusion_output: true
  diffusion_num_steps: 200

  decoder:
    # If null/omitted, inferred from predictor output dimension.
    input_channel: null
    channels: 1536
    rates: [8, 5, 4, 3]

  dac_loss:
    stft_loss:
      window_lengths: [2048, 512]
    mel_loss:
      n_mels: [5, 10, 20, 40, 80, 160, 320]
      window_lengths: [32, 64, 128, 256, 512, 1024, 2048]
      mel_fmin: [0, 0, 0, 0, 0, 0, 0]
      mel_fmax: [null, null, null, null, null, null, null]
      pow: 1.0
      clamp_eps: 1.0e-5
      mag_weight: 0.0

  loss:
    loss_weight:
      stft_loss: 1.0
      mel_loss: 15.0
      wav_loss: 1.0
      adv_gen: 2.0
      adv_feature: 1.0

  optim:
    lr: 1e-5
    disc_lr: 1e-5
    weight_decay: 0.01
    warmup_steps: 2000
    grad_clip_norm: 1.0

# Online (degrade-on-the-fly) data module for the sg-podcast dry run.
# Reads raw clean-audio WebDataset shards built by runpod/prepare_sg_data.py and
# produces clean/noisy + SSL inputs in one pass — no separate preprocess step.
# 48 kHz to match the released sidon-v0.1 DAC decoder (hop 960 x 50 fps).
datamodule:
  _target_: sidon.data.preprocess.WebDatasetDataModule
  train_wds_patterns:
    - /data/sg_wds/train
  val_wds_patterns:
    - /data/sg_wds/valid
  batch_size: 2
  sampling_rate: 48000
  ssl_model_name: facebook/w2v-bert-2.0
  speaker_ssl_model_name: null    # no speaker SSL for restoration finetune
  use_noise: true                 # exercise the full degradation pipeline
  max_duration: 10.0
  merge_samples: true             # required so SSL-frame -> decoder length aligns with input_wav
  train_num_workers: 2
  val_num_workers: 1
  noise_path:
    - /data/noise_wds             # synthetic noise generated by prepare_sg_data.py
  use_pra: true                   # synthetic pyroomacoustics RIR (no external RIR corpus)
  n_repeats: 1
  split_by_worker: false          # few shards in the dry run; let every worker read all
  add_squim_sdr: false            # skip SQUIM SI-SDR filtering (podcasts would be over-filtered)
